# ============================================================
# Configuração do Servidor MCP
# ============================================================
server.port=8080

# ============================================================
# Configuração do MCP (Model Context Protocol)
# ============================================================
# Nome do servidor MCP (será exibido no cliente)
mcp.server.name=massa-dados-core

# Versão do servidor MCP
mcp.server.version=1.0.0

# ============================================================
# Banco de Dados H2 (modo arquivo)
# ============================================================
spring.datasource.url=jdbc:h2:file:./data/massa-dados;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# Inicialização do banco (schema.sql + data.sql)
# ============================================================
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# ============================================================
# Console H2 (acessível em /h2-console)
# ============================================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================================
# Caminho das classes Entity (para o Servidor 1)
# ============================================================
# Diretório onde estão as classes Entity do Servidor 2
# (usado pelo McpDdlToEntityService para salvar novos arquivos)
entity.classes.path=src/main/java/com/thadeu/massa-dados-core/entity
