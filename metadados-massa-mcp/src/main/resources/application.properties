# Porta do servidor
server.port=8082

# Nome da aplicação
spring.application.name=metadados-massa-mcp

# Configuração do datasource H2 (para teste e desenvolvimento)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Caminho das classes Entity (ajustar conforme ambiente)
entity.classes.path=C:/Desenvolvimento/massa-dados-core/entities-core/src/main/java

# Caminho para armazenar demandas (ajustar conforme ambiente)
demandas.path=C:/Desenvolvimento/massa-dados-core/metadados-massa-mcp/demandas

# Logging - arquivo de log
logging.file.name=logs/metadados-massa-mcp.log
logging.file.max-size=10MB
logging.file.max-history=7
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Actuator - expor endpoint de loggers para alteração dinâmica de nível
management.endpoints.web.exposure.include=loggers
