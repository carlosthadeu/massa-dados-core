# Porta do servidor
server.port=8082

# Nome da aplicação
spring.application.name=metadados-massa-mcp

# Configuração do datasource H2 (para teste e desenvolvimento)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Caminho das classes Entity (ajustar conforme ambiente)
entity.classes.path=C:/Desenvolvimento/massa-dados-core/project-docs/dominio-aplicacao/entity
