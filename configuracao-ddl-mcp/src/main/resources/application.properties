# Porta do servidor
server.port=8081

# Nome da aplicacao
spring.application.name=configuracao-ddl-mcp

# Configuracao do datasource H2 (para teste e desenvolvimento)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Caminho das classes Entity (ajustar conforme ambiente)
entity.classes.path=C:\Desenvolvimento\massa-dados-core\entities-core\src\main\java\domain

# Caminho do projeto do Servidor 2 para recompilacao (ajustar conforme ambiente)
entity.project.path=C:/Desenvolvimento/massa-dados-core/metadados-massa-mcp

# Caminho do projeto entities-core para recompilacao (ajustar conforme ambiente)
entity.core.project.path=C:/Desenvolvimento/massa-dados-core/entities-core

# Logging - arquivo de log
logging.file.name=logs/configuracao-ddl-mcp.log
logging.file.max-size=10MB
logging.file.max-history=7
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Actuator - expor endpoint de loggers para alteracao dinamica de nivel
management.endpoints.web.exposure.include=loggers

# Timeout para requisicoes assincronas SSE (5 minutos)
spring.mvc.async.request-timeout=300000